# One-click deploy to Render (https://render.com) so MB Chatters is live for all
# users. Push this repo to GitHub, then in Render: New → Blueprint → pick the repo.
# After it deploys, set ADMIN_EMAIL / ADMIN_PASSWORD (and optional SMTP_*) in the
# service's Environment settings.
#
# PERSISTENCE: set DATABASE_URL (a free Neon/Supabase Postgres) below so accounts
# and admin approvals survive restarts/redeploys on the free plan. Without it, the
# free plan has no persistent disk and the user list resets on restart.
services:
  - type: web
    name: mb-chatters
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: node server/server.mjs
    envVars:
      - key: PORT
        value: 8787
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        value: Cheftyz
      # persistent storage: paste a free Neon/Supabase Postgres URL here so
      # accounts + approvals survive restarts:
      - key: DATABASE_URL
        sync: false
      # optional email for password-reset codes:
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
    # For persistent accounts (paid plan required), uncomment:
    # disk:
    #   name: mb-chatters-data
    #   mountPath: /app/server/data
    #   sizeGB: 1
